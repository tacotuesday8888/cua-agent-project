version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    groups:
      backend-npm:
        patterns:
          - "*"

  - package-ecosystem: "swift"
    directory: "/AutopilotKit"
    schedule:
      interval: "weekly"

  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
